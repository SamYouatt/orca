name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Detect new version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="v$(grep '^version' orca-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if gh release view "$version" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release $version already exists, skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $version"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: orca-aarch64-apple-darwin
            build_command: cargo build --release --target aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            name: orca-x86_64-apple-darwin
            build_command: cargo build --release --target x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: orca-x86_64-unknown-linux-gnu
            build_command: cargo zigbuild --release --target x86_64-unknown-linux-gnu
            uses_zig: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: orca-aarch64-unknown-linux-gnu
            build_command: cargo zigbuild --release --target aarch64-unknown-linux-gnu
            uses_zig: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        run: |
          rustup target add ${{ matrix.target }}

      - name: Install Zig
        if: ${{ matrix.uses_zig }}
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install cargo-zigbuild
        if: ${{ matrix.uses_zig }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build
        working-directory: orca-cli
        run: ${{ matrix.build_command }}

      - name: Package
        run: |
          cd orca-cli/target/${{ matrix.target }}/release
          tar czf ../../../../${{ matrix.name }}.tar.gz orca
          cd ../../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.check-version.outputs.version }}" \
            --title "${{ needs.check-version.outputs.version }}" \
            --target "$GITHUB_SHA" \
            --generate-notes \
            *.tar.gz
