name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Check release doesn't already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.tag.outputs.version }}" &>/dev/null; then
            echo "::error::Release ${{ steps.tag.outputs.version }} already exists. Bump the version."
            exit 1
          fi

      - name: Check tag matches Cargo.toml version
        run: |
          cargo_version="v$(grep '^version' orca-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          tag_version="${{ steps.tag.outputs.version }}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "::error::Tag $tag_version does not match Cargo.toml version $cargo_version"
            exit 1
          fi

  build:
    needs: check-version
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: orca-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            name: orca-x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: orca-x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        run: |
          rustup target add ${{ matrix.target }}

      - name: Build
        working-directory: orca-cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd orca-cli/target/${{ matrix.target }}/release
          tar czf ../../../../${{ matrix.name }}.tar.gz orca
          cd ../../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            *.tar.gz
