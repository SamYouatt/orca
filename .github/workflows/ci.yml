name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: orca-cli

      - name: Run tests
        working-directory: orca-cli
        run: cargo test

      - name: Clippy
        working-directory: orca-cli
        run: cargo clippy -- -D warnings
